<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>レベル移動</title>

<style>
:root{
  --navy:#2c5f8a; --navy-deep:#1b3d5a; --navy-soft:#eaf1f6;
  --ink:#16202a; --sub:#67788a; --paper:#eef2f5;
  --line:#d6dfe6; --ng:#c0392b; --gold:#a97514;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
  font-size:16px; line-height:1.45; -webkit-text-size-adjust:100%;
  padding-bottom:100px; transition:padding-bottom .18s;
}
body.kb{padding-bottom:330px}
body.kb .bar{display:none}

header{
  position:sticky; top:0; z-index:10; background:var(--navy-deep); color:#fff;
  padding:calc(8px + env(safe-area-inset-top)) 12px 8px; display:flex; align-items:center; gap:8px;
}
header h1{font-size:15px; margin:0; font-weight:600; letter-spacing:.06em; white-space:nowrap}
header input{
  flex:1; min-width:0; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
  color:#fff; border-radius:6px; padding:7px 10px; font-size:15px; font-family:inherit;
}
header input::placeholder{color:rgba(255,255,255,.5)}

main{max-width:600px; margin:0 auto; padding:12px 10px}

.card{background:#fff; border:1px solid var(--line); border-radius:10px; margin-bottom:10px; overflow:hidden}
.card.datum{border:2px solid var(--gold)}
.cap{display:flex; align-items:center; gap:8px; padding:7px 12px; background:var(--navy-soft);
  border-bottom:1px solid var(--line); font-size:12px; color:var(--sub); letter-spacing:.08em}
.cap .tag{margin-left:auto; padding:1px 8px; border-radius:9px; font-size:11px; font-weight:600; background:#fbf1dc; color:var(--gold)}
.pad{padding:10px 12px 12px}
.pair{display:flex; gap:10px}
.pair > div{flex:1; min-width:0}
label{display:block; font-size:11px; color:var(--sub); letter-spacing:.06em; margin-bottom:3px}
label b{color:var(--navy); font-family:var(--mono)}

.f{width:100%; padding:11px 10px; border:1px solid var(--line); border-radius:8px;
  font-size:17px; background:#fff; color:var(--ink); font-family:inherit}
.f:focus{outline:2px solid var(--navy); outline-offset:-1px; border-color:var(--navy)}
.f::placeholder{color:#b6c2cc}

/* タップして数字キーパッドで入れる欄 */
.k{font-family:var(--mono); text-align:right; font-variant-numeric:tabular-nums; cursor:pointer;
  user-select:none; background:#fff; caret-color:transparent}
.k.gold{border-color:var(--gold)}
.k.on{background:#fff8dc; outline:2px solid var(--navy); outline-offset:-1px; border-color:var(--navy)}

.setups{background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:10px}
.sh,.sr{display:grid; grid-template-columns:34px 1fr 1fr 92px 32px}
.sh{background:var(--navy-soft); border-bottom:1px solid var(--line)}
.sh span{padding:7px 6px; font-size:11px; color:var(--sub); letter-spacing:.06em; text-align:center}
.sh span b{color:var(--navy); font-family:var(--mono)}
.sr{align-items:stretch; border-bottom:1px solid #eef2f5}
.sr:last-child{border-bottom:none}
.sr .i{display:grid; place-items:center; font-family:var(--mono); font-size:13px; color:var(--sub)}
.sr .cell{
  border-left:1px solid #eef2f5; padding:14px 8px; font-size:17px; font-family:var(--mono);
  text-align:right; font-variant-numeric:tabular-nums; color:var(--ink); cursor:pointer; user-select:none;
}
.sr .cell.empty{color:#c3ccd4}
.sr .cell.on{background:#fff8dc; box-shadow:inset 0 0 0 2px var(--navy)}
.sr .el{border-left:1px solid #eef2f5; padding:14px 8px; text-align:right; font-family:var(--mono);
  font-variant-numeric:tabular-nums; font-size:15px; font-weight:600; color:var(--navy-deep); background:#f7fafc}
.sr .el.none{color:#c3ccd4; font-weight:400}
.sr .x{border:none; background:none; color:#c3ccd4; font-size:18px; cursor:pointer}
.sr .x:hover{color:var(--ng)}

.acts{display:flex; gap:8px; margin:14px 0 10px}
.acts button{flex:1; padding:14px; border-radius:9px; border:1px solid var(--line);
  background:#fff; color:var(--navy-deep); font-size:15px; font-family:inherit; cursor:pointer}
.acts button.g{background:var(--gold); color:#fff; border-color:var(--gold); font-weight:600}
.acts button:active{transform:translateY(1px)}
.acts button:disabled{opacity:.4}

.bar{position:fixed; left:0; right:0; bottom:0; z-index:10; background:var(--navy-deep); color:#fff;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom)); display:flex; align-items:center; gap:12px}
.bar .lab{font-size:11px; opacity:.7; letter-spacing:.08em}
.bar .big{font-family:var(--mono); font-size:26px; font-weight:600; line-height:1.15; font-variant-numeric:tabular-nums}
.bar .big small{font-size:13px; opacity:.7; font-weight:400}
.bar .sp{flex:1}
.chip{padding:4px 10px; border-radius:12px; font-size:11px; font-weight:600; text-align:center;
  white-space:nowrap; background:rgba(255,255,255,.15)}
.chip.ng{background:var(--ng)}
.chip .c{display:block; font-family:var(--mono); font-size:14px}

.msg{background:#fdf6e3; border:1px solid #e8d9a8; color:#7a5c00; border-radius:8px;
  padding:10px 12px; font-size:13px; margin-bottom:10px}
.msg:empty{display:none}

/* ---- 数字キーパッド ---- */
#kb{
  position:fixed; left:0; right:0; bottom:0; z-index:30; background:#dfe5ea;
  border-top:1px solid #b9c4cd; padding:0 6px calc(6px + env(safe-area-inset-bottom));
  transform:translateY(100%); transition:transform .18s ease-out;
}
#kb.open{transform:none}
#kbTop{display:flex; align-items:baseline; gap:10px; padding:9px 8px 7px}
#kbTop .who{font-size:12px; color:var(--sub); letter-spacing:.06em}
#kbTop .val{margin-left:auto; font-family:var(--mono); font-size:24px; font-weight:600; color:var(--navy-deep)}
#kbTop .val u{text-decoration:none; color:#c3ccd4}
#kbTop .unit{font-size:12px; color:var(--sub)}
#keys{display:grid; grid-template-columns:repeat(4,1fr); gap:6px}
#keys button{
  padding:16px 0; font-size:23px; font-family:var(--mono); border:none; border-radius:8px;
  background:#fff; color:var(--ink); cursor:pointer; box-shadow:0 1px 0 #aab6bf;
}
#keys button:active{background:#eef2f5; transform:translateY(1px); box-shadow:none}
#keys button.fn{font-size:15px; font-family:inherit; background:#c3ccd4; color:var(--navy-deep)}
#keys button.go{background:var(--navy); color:#fff; font-size:15px; font-family:inherit; font-weight:600}

@media print{ header,.acts,.bar,#kb,.sr .x{display:none} body{background:#fff;padding:0} }
</style>

<header>
  <h1>レベル移動</h1>
  <input id="site" placeholder="現場名">
</header>

<main>
  <div class="msg" id="msg"></div>

  <div class="card" id="startCard">
    <div class="cap">起点<span class="tag" id="startTag" hidden>基準</span></div>
    <div class="pad"><div class="pair">
      <div><label>点名</label><input class="f" id="startName" placeholder="KBM1"></div>
      <div><label>標高 m（分かる場合）</label><div class="f k" id="startH" data-fld="startH" tabindex="0">—</div></div>
    </div></div>
  </div>

  <div class="setups">
    <div class="sh"><span></span><span>後視 <b>＋</b></span><span>前視 <b>−</b></span><span>標高 m</span><span></span></div>
    <div id="list"></div>
  </div>

  <div class="card" id="endCard" hidden>
    <div class="cap">終点<span class="tag" id="endTag" hidden>基準</span></div>
    <div class="pad"><div class="pair">
      <div><label>点名</label><input class="f" id="endName" placeholder="No.16"></div>
      <div><label>標高 m（既知なら入力）</label><div class="f k gold" id="endH" data-fld="endH" tabindex="0">—</div></div>
    </div></div>
  </div>

  <div class="acts">
    <button class="g" id="btnEnd">ここを終点にする</button>
    <button id="btnCopy">コピー</button>
    <button id="btnClear">クリア</button>
  </div>
</main>

<div class="bar">
  <div><div class="lab" id="bLab">最終点</div><div class="big" id="bVal">—</div></div>
  <span class="sp"></span>
  <div class="chip" id="chip" hidden></div>
</div>

<div id="kb">
  <div id="kbTop">
    <span class="who" id="kbWho"></span>
    <span class="val" id="kbVal">—</span><span class="unit">m</span>
  </div>
  <div id="keys">
    <button data-d="7">7</button><button data-d="8">8</button><button data-d="9">9</button>
    <button class="fn" data-a="bs">⌫</button>
    <button data-d="4">4</button><button data-d="5">5</button><button data-d="6">6</button>
    <button class="fn" data-a="clr">C</button>
    <button data-d="1">1</button><button data-d="2">2</button><button data-d="3">3</button>
    <button class="fn" data-a="neg">±</button>
    <button class="fn" data-a="00">00</button><button data-d="0">0</button>
    <button class="go" data-a="next">次へ</button><button class="go" data-a="done">完了</button>
  </div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);

/* 値はすべて「digit文字列」で持つ。下3桁がミリ。 "1550" → 1.550 / "9484" → 9.484 */
const toVal = s => {
  if(!s) return null;
  const neg = s[0] === "-", d = neg ? s.slice(1) : s;
  if(!d) return null;
  const n = parseInt(d,10);
  return Number.isFinite(n) ? (neg ? -n : n)/1000 : null;
};
const fmt = s => { const v = toVal(s); return v===null ? "" : v.toFixed(3); };
const f3  = v => Number.isFinite(v) ? v.toFixed(3) : "";
const row = () => ({bs:"", fs:""});

const S = { site:"", startName:"", startH:"", rows:[row()], ended:false, endName:"", endH:"" };
let act = null;   // {i,k} か {fld:"startH"|"endH"}

/* ---------- 計算 ---------- */
function compute(){
  const off = [0];
  for(const r of S.rows){
    const bs = toVal(r.bs), fs = toVal(r.fs), last = off[off.length-1];
    off.push((bs===null && fs===null) ? null : (last===null ? null : last + (bs||0) - (fs||0)));
  }
  const n = S.rows.length, H = new Array(n+1).fill(null);
  const h0 = toVal(S.startH), hEnd = S.ended ? toVal(S.endH) : null;
  let close = null, base = null, msg = "";

  if(h0 !== null) base = 0;
  else if(hEnd !== null && off[n] !== null) base = n;
  else {
    msg = S.ended ? "起点にも終点にも標高がありません。どちらかを入れると全点が計算されます。"
                  : "起点の標高を入れると、前視するたびに標高が出ます。分からない場合は終点まで観測してから終点の標高を入れてください。";
    return {off, H, close, base, msg, n};
  }
  if(off[base] === null){ msg = "後視・前視が埋まっていない行があります。"; return {off, H, close, base, msg, n}; }

  const bh = (base === 0) ? h0 : hEnd;
  for(let i=0;i<=n;i++) if(off[i] !== null) H[i] = bh + (off[i] - off[base]);

  if(h0 !== null && hEnd !== null && H[n] !== null && n > 0){
    close = H[n] - hEnd;
    for(let i=0;i<=n;i++) if(H[i] !== null) H[i] -= close * (i/n);
  }
  return {off, H, close, base, msg, n};
}

/* ---------- 描画 ---------- */
const same = (a,b) => a && b && a.i===b.i && a.k===b.k && a.fld===b.fld;

function render(){
  const R = compute();
  $("msg").textContent = R.msg;

  $("startCard").classList.toggle("datum", R.base === 0);
  $("startTag").hidden = R.base !== 0;
  $("endCard").hidden = !S.ended;
  $("endCard").classList.toggle("datum", S.ended && R.base === R.n);
  $("endTag").hidden = !(S.ended && R.base === R.n);
  $("btnEnd").textContent = S.ended ? "終点を解除して続ける" : "ここを終点にする";
  $("btnEnd").disabled = !S.ended && !S.rows.some(r => toVal(r.fs) !== null);

  const last = S.rows.length - 1;
  $("list").innerHTML = S.rows.map((r,i) => {
    const h = R.H[i+1], isEnd = S.ended && i === last;
    const cell = (k,v) => `<div class="cell ${v?"":"empty"} ${same(act,{i,k})?"on":""}" data-i="${i}" data-k="${k}">${v ? fmt(v) : "—"}</div>`;
    return `<div class="sr">
      <div class="i">${isEnd ? "終" : i+1}</div>
      ${cell("bs", r.bs)}${cell("fs", r.fs)}
      <div class="el ${h===null?"none":""}">${h===null ? "—" : f3(h)}</div>
      <button class="x" data-del="${i}" aria-label="削除">×</button>
    </div>`;
  }).join("");

  // 起点・終点の標高欄（基準でない側は逆算値／計算値を薄く出す）
  const sh = $("startH"), eh = $("endH");
  sh.classList.toggle("on", same(act,{fld:"startH"}));
  eh.classList.toggle("on", same(act,{fld:"endH"}));
  sh.textContent = S.startH ? fmt(S.startH) : (R.base !== 0 && R.H[0] !== null ? f3(R.H[0]) : "—");
  sh.style.color = S.startH ? "" : "#b6c2cc";
  eh.textContent = S.endH ? fmt(S.endH) : (S.ended && R.base === 0 && R.H[R.n] !== null ? f3(R.H[R.n]) : "—");
  eh.style.color = S.endH ? "" : "#b6c2cc";

  let li = -1;
  for(let i=R.H.length-1;i>=0;i--) if(R.H[i] !== null){ li = i; break; }
  const nm = li <= 0 ? (S.startName || "起点")
           : (S.ended && li === R.n) ? (S.endName || "終点") : "点 " + li;
  $("bLab").textContent = (R.base !== 0 && li === 0) ? (S.startName || "起点") + "（逆算）" : nm;
  $("bVal").innerHTML = li < 0 ? "—" : f3(R.H[li]) + ' <small>m</small>';

  const chip = $("chip");
  if(R.close === null) chip.hidden = true;
  else {
    const mm = R.close * 1000;
    chip.hidden = false;
    chip.className = "chip" + (Math.abs(mm) > 5 ? " ng" : "");
    chip.innerHTML = `閉合差<span class="c">${mm>=0?"+":""}${mm.toFixed(1)} mm</span>`;
  }
  drawKb();
}

/* ---------- キーパッド ---------- */
const getD = () => act ? (act.fld ? S[act.fld] : S.rows[act.i][act.k]) : "";
const setD = d => { if(!act) return; if(act.fld) S[act.fld] = d; else S.rows[act.i][act.k] = d; };

function label(){
  if(!act) return "";
  if(act.fld) return act.fld === "startH" ? "起点 標高" : "終点 標高";
  const isEnd = S.ended && act.i === S.rows.length-1;
  return `${isEnd ? "終点" : "器械点 " + (act.i+1)}　${act.k === "bs" ? "後視 ＋" : "前視 −"}`;
}

function drawKb(){
  const open = !!act;
  $("kb").classList.toggle("open", open);
  document.body.classList.toggle("kb", open);
  if(!open) return;
  $("kbWho").textContent = label();
  const d = getD();
  $("kbVal").innerHTML = d ? fmt(d) : "<u>0.000</u>";
}

function focusField(a){
  act = a;
  render();
  const el = a.fld ? $(a.fld) : document.querySelector(`[data-i="${a.i}"][data-k="${a.k}"]`);
  if(el) el.scrollIntoView({block:"center", behavior:"smooth"});
}

function nextField(){
  if(!act || act.fld){ act = null; render(); return; }
  if(act.k === "bs"){ focusField({i:act.i, k:"fs"}); return; }
  // 前視を終えた → 次の器械点の後視へ（必要なら行を足す）
  if(!S.ended && act.i === S.rows.length-1 && toVal(S.rows[act.i].fs) !== null) S.rows.push(row());
  if(act.i + 1 < S.rows.length) focusField({i:act.i+1, k:"bs"});
  else { act = null; render(); }
}

function press(key){
  if(!act) return;
  let d = getD();
  if(/^\d$/.test(key) || key === "00"){ if(d.replace("-","").length < 7) d += key; }
  else if(key === "bs") d = d.slice(0,-1);
  else if(key === "clr") d = "";
  else if(key === "neg") d = d.startsWith("-") ? d.slice(1) : "-" + d;
  setD(d);
  // 前視まで入れたら次の行を先に生やしておく
  if(!S.ended && !act.fld && act.k === "fs" && act.i === S.rows.length-1 && toVal(d) !== null) S.rows.push(row());
  render();
}

$("keys").addEventListener("click", e => {
  const b = e.target.closest("button"); if(!b) return;
  if(b.dataset.d !== undefined) return press(b.dataset.d);
  const a = b.dataset.a;
  if(a === "next") nextField();
  else if(a === "done"){ act = null; render(); }
  else press(a);
});

/* PCの物理キーボードも受ける */
document.addEventListener("keydown", e => {
  if(!act) return;
  if(/^\d$/.test(e.key)){ e.preventDefault(); press(e.key); }
  else if(e.key === "Backspace"){ e.preventDefault(); press("bs"); }
  else if(e.key === "Enter" || e.key === "Tab"){ e.preventDefault(); nextField(); }
  else if(e.key === "Escape"){ act = null; render(); }
  else if(e.key === "-"){ e.preventDefault(); press("neg"); }
});

/* ---------- タップ ---------- */
document.addEventListener("click", e => {
  const cell = e.target.closest(".cell");
  if(cell){ focusField({i:+cell.dataset.i, k:cell.dataset.k}); return; }
  const fld = e.target.closest("[data-fld]");
  if(fld){ focusField({fld:fld.dataset.fld}); return; }

  const del = e.target.closest("[data-del]");
  if(del){
    const i = +del.dataset.del;
    if(S.rows.length > 1) S.rows.splice(i,1); else S.rows = [row()];
    act = null; render(); return;
  }
  // 欄・キーパッド以外を触ったら閉じる
  if(act && !e.target.closest("#kb")){ act = null; render(); }
});

document.addEventListener("input", e => {
  const id = e.target.id;
  if(["site","startName","endName"].includes(id)){
    S[id] = e.target.value;
    if(id !== "site") render();
  }
});
document.addEventListener("focusin", e => {
  if(e.target.tagName === "INPUT" && act){ act = null; render(); }
});

$("btnEnd").onclick = () => {
  act = null;
  if(S.ended){ S.ended = false; S.rows.push(row()); }
  else {
    while(S.rows.length > 1 && toVal(S.rows[S.rows.length-1].fs) === null) S.rows.pop();
    S.ended = true;
  }
  render();
  if(S.ended) $("endName").focus();
};

$("btnClear").onclick = () => {
  if(!confirm("入力をすべて消します。よろしいですか？")) return;
  Object.assign(S, {startName:"", startH:"", rows:[row()], ended:false, endName:"", endH:""});
  ["startName","endName"].forEach(k => $(k).value = "");
  act = null; render();
};

$("btnCopy").onclick = async () => {
  const R = compute(), L = [];
  if(S.site) L.push(S.site);
  L.push(`${S.startName || "起点"}\t${R.H[0]===null ? "—" : f3(R.H[0])}`);
  S.rows.forEach((r,i) => {
    if(R.H[i+1] === null) return;
    const nm = (S.ended && i === S.rows.length-1) ? (S.endName || "終点") : "点" + (i+1);
    L.push(`${nm}\t${f3(R.H[i+1])}\tBS ${fmt(r.bs) || "-"} / FS ${fmt(r.fs) || "-"}`);
  });
  if(R.close !== null) L.push(`閉合差 ${(R.close*1000).toFixed(1)} mm（按分補正済み）`);
  const text = L.join("\n");
  try{ await navigator.clipboard.writeText(text); alert("コピーしました"); }
  catch(_){ prompt("コピーしてください", text); }
};

render();
</script>
